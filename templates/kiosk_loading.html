<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Loading</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0f1117;
            color:#e4e6f0;
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            user-select:none;
        }

        /* Logo */
        .logo {
            width:120px;height:120px;
            background:linear-gradient(135deg,#5b6abf,#7c3aed);
            border-radius:28px;
            display:flex;align-items:center;justify-content:center;
            font-size:56px;font-weight:700;color:#fff;
            cursor:pointer;
            box-shadow:0 8px 32px rgba(91,106,191,0.4);
            transition:transform 0.2s,box-shadow 0.2s;
            margin-bottom:32px;
        }
        .logo:hover { transform:scale(1.05); box-shadow:0 12px 40px rgba(91,106,191,0.5); }
        .logo:active { transform:scale(0.97); }

        /* Status area */
        .status {
            text-align:center;
            min-height:80px;
        }
        .status-text {
            font-size:18px;
            color:#8b8fa8;
            margin-bottom:8px;
        }
        .status-detail {
            font-size:14px;
            color:#5a5e76;
        }
        .status-error {
            color:#f87171;
            font-size:16px;
            font-weight:600;
        }
        .status-ok {
            color:#22c55e;
        }

        /* Countdown bar */
        .countdown-bar {
            position:fixed;
            top:0;left:0;
            height:4px;
            background:linear-gradient(90deg,#5b6abf,#22c55e);
            transition:width 0.3s linear;
            z-index:100;
        }

        /* Network info - bottom right */
        .netinfo {
            position:fixed;
            bottom:16px;right:24px;
            text-align:right;
            font-size:12px;
            color:#5a5e76;
            line-height:1.8;
            font-family:'Courier New',monospace;
        }
        .netinfo .label {
            color:#8b8fa8;
            font-weight:600;
        }

        /* Tap hint */
        .tap-hint {
            position:fixed;
            bottom:16px;left:24px;
            font-size:11px;
            color:#3a3d50;
        }
    </style>
</head>
<body>
    <div class="countdown-bar" id="countdown-bar"></div>

    <div class="logo" id="logo" title="Tap to open admin panel">K</div>

    <div class="status" id="status">
        <div class="status-text">Starting up...</div>
    </div>

    <div class="netinfo" id="netinfo">
        <div><span class="label">IP:</span> Loading...</div>
    </div>

    <div class="tap-hint">Tap logo to access admin panel</div>

    <script>
    (function() {
        const COUNTDOWN_SECONDS = 5;
        let countdown = COUNTDOWN_SECONDS;
        let urlReachable = false;
        let kioskUrl = '';
        let checking = true;

        const statusEl = document.getElementById('status');
        const barEl = document.getElementById('countdown-bar');
        const netinfoEl = document.getElementById('netinfo');
        const logoEl = document.getElementById('logo');

        // --- Logo tap → admin login ---
        logoEl.addEventListener('click', function() {
            window.location.href = '/login';
        });
        logoEl.addEventListener('touchend', function(e) {
            e.preventDefault();
            window.location.href = '/login';
        });

        // --- Load network info ---
        function loadNetInfo() {
            fetch('/kiosk/api/netinfo')
                .then(r => r.json())
                .then(data => {
                    let html = '';
                    if (data.ip) html += '<div><span class="label">IP:</span> ' + data.ip + '</div>';
                    else html += '<div><span class="label">IP:</span> Not assigned</div>';
                    if (data.subnet) html += '<div><span class="label">Subnet:</span> ' + data.subnet + '</div>';
                    if (data.gateway) html += '<div><span class="label">Gateway:</span> ' + data.gateway + '</div>';
                    if (data.dns) html += '<div><span class="label">DNS:</span> ' + data.dns + '</div>';
                    netinfoEl.innerHTML = html || '<div>No network</div>';
                })
                .catch(() => {
                    netinfoEl.innerHTML = '<div>Network info unavailable</div>';
                });
        }

        // --- Check URL reachability ---
        function checkUrl() {
            statusEl.innerHTML = '<div class="status-text">Checking connection...</div>';
            fetch('/kiosk/api/check-url')
                .then(r => r.json())
                .then(data => {
                    kioskUrl = data.url;
                    if (data.reachable) {
                        urlReachable = true;
                        statusEl.innerHTML =
                            '<div class="status-text status-ok">Connected</div>' +
                            '<div class="status-detail">Redirecting in <span id="cd-num">' + countdown + '</span>s...</div>';
                        startCountdown();
                    } else {
                        urlReachable = false;
                        statusEl.innerHTML =
                            '<div class="status-error">' + escapeHtml(data.error || 'Connection failed') + '</div>' +
                            '<div class="status-detail" style="margin-top:8px;">Target: ' + escapeHtml(data.url) + '</div>' +
                            '<div class="status-detail" style="margin-top:12px;">Retrying in 10 seconds...</div>';
                        setTimeout(checkUrl, 10000);
                    }
                    checking = false;
                })
                .catch(() => {
                    statusEl.innerHTML =
                        '<div class="status-error">Service not ready</div>' +
                        '<div class="status-detail" style="margin-top:8px;">Retrying in 5 seconds...</div>';
                    setTimeout(checkUrl, 5000);
                });
        }

        // --- Countdown timer ---
        function startCountdown() {
            barEl.style.width = '100%';
            const interval = setInterval(function() {
                countdown--;
                const cdNum = document.getElementById('cd-num');
                if (cdNum) cdNum.textContent = countdown;
                barEl.style.width = ((countdown / COUNTDOWN_SECONDS) * 100) + '%';

                if (countdown <= 0) {
                    clearInterval(interval);
                    if (urlReachable && kioskUrl) {
                        window.location.href = kioskUrl;
                    }
                }
            }, 1000);
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // --- Init ---
        loadNetInfo();
        // Small delay for flask service to be fully ready on boot
        setTimeout(checkUrl, 1000);
    })();
    </script>
</body>
</html>
